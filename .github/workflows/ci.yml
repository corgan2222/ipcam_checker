name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Check for new secrets
        run: detect-secrets-hook --baseline .secrets.baseline $(git diff --name-only HEAD~1 HEAD 2>/dev/null || git ls-files) 2>/dev/null || detect-secrets audit --report .secrets.baseline

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: [secrets, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package + dev deps
        run: pip install -e ".[dev,onvif,discovery]"

      - name: Run tests
        run: pytest --tb=short -q
