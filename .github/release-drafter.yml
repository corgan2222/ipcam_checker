name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels:
      - feature
      - enhancement
  - title: "🐛 Bug Fixes"
    labels:
      - fix
      - bugfix
      - bug
  - title: "🧰 Maintenance"
    labels:
      - chore
      - refactor
      - dependencies
  - title: "📖 Documentation"
    labels:
      - documentation
      - docs
  - title: "✅ Tests"
    labels:
      - test
      - tests

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking-change
      - major
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - fix
      - bugfix
      - bug
      - chore
      - refactor
      - documentation
      - docs
      - test
  default: patch

autolabeler:
  - label: feature
    title:
      - "/^feat/i"
  - label: fix
    title:
      - "/^fix/i"
  - label: chore
    title:
      - "/^chore/i"
      - "/^refactor/i"
      - "/^ci/i"
  - label: documentation
    title:
      - "/^docs/i"
  - label: test
    title:
      - "/^test/i"

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
